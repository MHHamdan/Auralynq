# Auralynq stack — Podman-compatible. `make stack-up`.
# Rootless-friendly: no privileged ports, named volumes, no host networking.
name: auralynq

services:
  qdrant:
    image: docker.io/qdrant/qdrant:v1.12.1
    container_name: auralynq-qdrant
    # Host ports are configurable to avoid clashes with other local stacks
    # (defaults 6333/6334). In-cluster, the API always reaches Qdrant at
    # qdrant:6333 over the compose network regardless of the host mapping.
    ports:
      - "${AURALYNQ_QDRANT_HTTP_PORT:-6333}:6333"
      - "${AURALYNQ_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - auralynq-qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "true"]
      interval: 10s
      timeout: 5s
      retries: 5

  phoenix:
    image: docker.io/arizephoenix/phoenix:latest
    container_name: auralynq-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_WORKING_DIR=/data
    volumes:
      - auralynq-phoenix:/data

  api:
    build:
      context: .
      dockerfile: containers/api.Dockerfile
    image: auralynq-api:latest
    container_name: auralynq-api
    # Run as container-root so writes to the bind-mounted ./data land owned by the
    # host user (rootless Podman maps container uid 0 -> the invoking host user).
    # This is safe under rootless Podman (container root is an unprivileged host uid).
    user: "0:0"
    command: ["uvicorn", "auralynq.serving.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${AURALYNQ_API_PORT:-8000}:8000"
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - AURALYNQ_VECTOR__URL=${AURALYNQ_VECTOR_URL:-http://qdrant:6333}
      - AURALYNQ_VECTOR__BACKEND=${AURALYNQ_VECTOR_BACKEND:-auto}
      - AURALYNQ_TELEMETRY__OTLP_ENDPOINT=http://phoenix:4317
      - AURALYNQ_DATA_DIR=/app/data
      # Browser origin(s) allowed by CORS. Override for a remote server, e.g.
      # AURALYNQ_SERVE__CORS_ORIGINS='["http://<SERVER_IP>:3300"]'
      - AURALYNQ_SERVE__CORS_ORIGINS=${AURALYNQ_SERVE__CORS_ORIGINS:-["http://localhost:3000"]}
    volumes:
      # Podman-managed named volume avoids rootless bind-mount ownership clashes.
      # Seed it with: podman exec auralynq-api auralynq data && ... index
      - auralynq-data:/app/data
      - ./reports:/app/reports
    depends_on:
      - qdrant
      - phoenix

  worker:
    build:
      context: .
      dockerfile: containers/api.Dockerfile
    image: auralynq-api:latest
    container_name: auralynq-worker
    user: "0:0"  # see api service note (rootless bind-mount write access)
    command: ["python", "-m", "auralynq.serving.worker"]
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - AURALYNQ_VECTOR__URL=${AURALYNQ_VECTOR_URL:-http://qdrant:6333}
      - AURALYNQ_VECTOR__BACKEND=${AURALYNQ_VECTOR_BACKEND:-auto}
      - AURALYNQ_DATA_DIR=/app/data
    volumes:
      - auralynq-data:/app/data
    depends_on:
      - qdrant

  web:
    build:
      context: ./web
      dockerfile: ../containers/web.Dockerfile
      args:
        # Baked into the client bundle. Override for a remote server:
        # NEXT_PUBLIC_API_BASE=http://<SERVER_IP>:8000
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    image: auralynq-web:latest
    container_name: auralynq-web
    ports:
      - "${AURALYNQ_WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - api

volumes:
  auralynq-qdrant:
  auralynq-phoenix:
  auralynq-data:
