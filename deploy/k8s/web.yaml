# Web — Next.js UI + same-origin /api proxy (injects the bearer token server-side).
# Stateless; scales horizontally. Public entry is via the Ingress (ingress.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auralynq-web
  namespace: auralynq
  labels: { app.kubernetes.io/name: auralynq-web, app.kubernetes.io/part-of: auralynq }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: auralynq-web }
  template:
    metadata:
      labels: { app.kubernetes.io/name: auralynq-web, app.kubernetes.io/part-of: auralynq }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: web
          image: ghcr.io/mhhamdan/auralynq-web:0.1.0
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - name: AURALYNQ_API_INTERNAL
              valueFrom: { configMapKeyRef: { name: auralynq-config, key: AURALYNQ_API_INTERNAL } }
            - name: AURALYNQ_SERVE__API_KEY
              valueFrom: { secretKeyRef: { name: auralynq-secrets, key: AURALYNQ_SERVE__API_KEY } }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: auralynq-web
  namespace: auralynq
  labels: { app.kubernetes.io/name: auralynq-web, app.kubernetes.io/part-of: auralynq }
spec:
  selector: { app.kubernetes.io/name: auralynq-web }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
