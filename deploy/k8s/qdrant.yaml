# Qdrant — the vector store. Stateful (persistent volume), single replica:
# scaling Qdrant means clustering, which is a separate concern from the stateless
# app tier. The app tier scales independently against this one Service.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auralynq-qdrant
  namespace: auralynq
  labels: { app.kubernetes.io/name: auralynq-qdrant, app.kubernetes.io/part-of: auralynq }
spec:
  serviceName: auralynq-qdrant
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: auralynq-qdrant }
  template:
    metadata:
      labels: { app.kubernetes.io/name: auralynq-qdrant, app.kubernetes.io/part-of: auralynq }
    spec:
      securityContext: { runAsNonRoot: false }
      containers:
        - name: qdrant
          image: docker.io/qdrant/qdrant:v1.12.1
          ports:
            - { name: http, containerPort: 6333 }
            - { name: grpc, containerPort: 6334 }
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 6333 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
          volumeMounts:
            - { name: storage, mountPath: /qdrant/storage }
  volumeClaimTemplates:
    - metadata: { name: storage }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: auralynq-qdrant
  namespace: auralynq
  labels: { app.kubernetes.io/name: auralynq-qdrant, app.kubernetes.io/part-of: auralynq }
spec:
  selector: { app.kubernetes.io/name: auralynq-qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333 }
    - { name: grpc, port: 6334, targetPort: 6334 }
